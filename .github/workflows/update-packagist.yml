name: Update Packagist

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-packagist:
    name: Update Composer package
    runs-on: ubuntu-latest

    steps:
      - name: Request Packagist update
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
          PACKAGE_REPOSITORY: https://github.com/WPBoilerplate/wpb-access-control
        run: |
          if [ -z "$PACKAGIST_USERNAME" ] || [ -z "$PACKAGIST_TOKEN" ]; then
            echo "PACKAGIST_USERNAME and PACKAGIST_TOKEN repository secrets are required."
            exit 1
          fi

          curl --fail-with-body --show-error --silent \
            --request POST \
            --header 'Content-Type: application/json' \
            --data "{\"repository\":{\"url\":\"${PACKAGE_REPOSITORY}\"}}" \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}"
